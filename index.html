<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EB Norm Portal | Bilal Versiyonu</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #f1f5f9; --sidebar: #0f172a; --accent: #4f46e5; --card: #ffffff; --text: #1e293b; --green: #10b981; --red: #ef4444; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 260px; background: var(--sidebar); color: white; padding: 25px; display: flex; flex-direction: column; flex-shrink: 0; height: 100vh; }
        .sidebar h2 { font-size: 20px; font-weight: 800; margin-bottom: 30px; text-align: center; }
        .nav-btn { padding: 12px 15px; cursor: pointer; border-radius: 10px; color: #94a3b8; border: none; background: none; width: 100%; text-align: left; font-weight: 600; margin-bottom: 8px; transition: 0.3s; display: flex; align-items: center; gap: 10px; }
        .nav-btn:hover, .nav-btn.active { background: var(--accent); color: white; }
        
        .main { flex: 1; overflow-y: auto; padding: 25px; }
        .card { background: white; border-radius: 16px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px; }
        
        .filter-bar { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
        .f-input { padding: 10px 15px; border-radius: 10px; border: 1px solid #e2e8f0; flex: 1; min-width: 150px; outline: none; }

        table { width: 100%; border-collapse: collapse; background: white; }
        th { background: #f8fafc; padding: 12px; text-align: left; color: #64748b; font-size: 11px; text-transform: uppercase; border-bottom: 2px solid #e2e8f0; }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; font-size: 13px; }

        /* Grafik Kutusu Küçültme */
        .chart-container { position: relative; height: 250px; width: 100%; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 15px; border-radius: 12px; border-left: 5px solid var(--accent); }
        .stat-card h2 { font-size: 24px; font-weight: 800; }

        .hidden { display: none !important; }
        #upload-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.9); z-index: 1000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        
        input, select, textarea { width: 100%; padding: 10px; margin-top: 5px; border-radius: 8px; border: 1px solid #ddd; }
        .btn-green { background: var(--green); color: white; padding: 12px; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; width: 100%; }
    </style>
</head>
<body>

<div id="upload-overlay" class="hidden">
    <div class="card" style="text-align:center; min-width: 400px;">
        <h2>📂 Dosya Yükle</h2>
        <input type="file" id="csvFile" accept=".csv" style="margin: 20px 0;">
        <div style="display:flex; gap:10px;">
            <button onclick="processAndSync()" class="btn-green" style="flex:2">SQL'e Gönder</button>
            <button onclick="toggleUpload(false)" style="flex:1; background:#64748b; color:white; border:none; border-radius:10px; cursor:pointer;">Kapat</button>
        </div>
    </div>
</div>

<div class="sidebar">
    <h2>EB NORM PORTAL</h2>
    <button class="nav-btn active" onclick="showView('table', this)">📋 Kadro Listesi</button>
    <button class="nav-btn" onclick="showView('dash', this)">📊 Analiz Paneli</button>
    <button class="nav-btn" onclick="showView('demands', this)">💡 Talep Yönetimi</button>
    
    <div style="margin-top:auto">
        <button class="nav-btn" onclick="toggleUpload(true)" style="color:var(--green)">➕ Dosya Yükle</button>
        <button class="nav-btn" onclick="location.reload()" style="color:#60a5fa">🔄 Veriyi Tazele</button>
    </div>
</div>

<div class="main">
    <div id="view-table">
        <div class="filter-bar">
            <input type="text" id="qSearch" class="f-input" placeholder="Pozisyon/Birim ara..." oninput="renderTable()">
            <select id="qBirim" class="f-input" onchange="renderTable()"><option value="">Tüm Birimler</option></select>
            <select id="qStatus" class="f-input" onchange="renderTable()">
                <option value="">Doluluk Tümü</option>
                <option value="vacant">Boş Kadrolar 🔴</option>
                <option value="full">Tam Kadrolar ✅</option>
            </select>
        </div>
        <div class="card" style="padding:0; overflow:hidden;">
            <table>
                <thead><tr><th>Birim</th><th>Pozisyon</th><th>Norm</th><th>Fiili</th><th>Durum</th></tr></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <div id="view-dash" class="hidden">
        <div class="stats-grid" id="statsGrid"></div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
            <div class="card">
                <h3>Yaka Dağılımı</h3>
                <div class="chart-container"><canvas id="chartCollar"></canvas></div>
            </div>
            <div class="card">
                <h3>Birim Doluluk</h3>
                <div class="chart-container"><canvas id="chartUnits"></canvas></div>
            </div>
        </div>
        <div class="card" style="padding:0; overflow:hidden; margin-top: 20px;">
            <h3 style="padding:15px; border-bottom: 2px solid #eee; color: var(--red);">Boş Kadrolar</h3>
            <table>
                <thead><tr><th>Birim</th><th>Pozisyon</th><th>Norm</th><th>Fiili</th><th>Eksik</th></tr></thead>
                <tbody id="vacantBody"></tbody>
            </table>
        </div>
    </div>

    <div id="view-demands" class="hidden">
        <div style="display:grid; grid-template-columns: 1fr 2fr; gap:20px;">
            <div class="card">
                <h3>Yeni Talep</h3>
                <input type="text" id="t-birim" placeholder="Birim Adı">
                <input type="text" id="t-poz" placeholder="Pozisyon">
                <select id="t-yaka"><option value="Mavi yaka">Mavi Yaka</option><option value="Beyaz yaka">Beyaz Yaka</option></select>
                <textarea id="t-neden" placeholder="Gerekçe" rows="3"></textarea>
                <button onclick="addDemand()" class="btn-green" style="margin-top:10px;">Talebi Gönder</button>
            </div>
            <div class="card" style="padding:0; overflow:hidden;">
                <h3 style="padding:15px">Aktif Talepler</h3>
                <table>
                    <thead><tr><th>Birim</th><th>Pozisyon</th><th>Durum</th><th>Sil</th></tr></thead>
                    <tbody id="demandBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
// --- KEY GÖMÜLDÜ ---
const supabaseUrl = 'https://kvnkjzympplbpvvmuqdw.supabase.co';
const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt2bmtqenltcHBsYnB2dm11cWR3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxMDQ3NDcsImV4cCI6MjA4ODY4MDc0N30.Ajf2gASU_PxhTKZvH0UDg-XXmbCj3bJYww-otWEI73w';
const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

let db = { pos: [], demands: [] };
let charts = {};

async function loadData() {
    const { data: pos } = await _supabase.from('norm_kadro').select('*');
    const { data: dem } = await _supabase.from('demands').select('*').order('created_at', {ascending: false});
    if(pos) db.pos = pos;
    if(dem) db.demands = dem;
    updateFilters();
    renderTable();
    renderDemands();
}

// TALEP SİSTEMİ
async function addDemand() {
    const b = document.getElementById('t-birim').value;
    const p = document.getElementById('t-poz').value;
    const y = document.getElementById('t-yaka').value;
    const n = document.getElementById('t-neden').value;
    if(!b || !p) return alert("Hata: Bilgiler eksik!");
    await _supabase.from('demands').insert([{ birim: b, pozisyon: p, yaka: y, neden: n, durum: 'Beklemede' }]);
    alert("Talep başarıyla gönderildi.");
    location.reload();
}

function renderDemands() {
    document.getElementById('demandBody').innerHTML = db.demands.map(d => `
        <tr><td>${d.birim}</td><td>${d.pozisyon}</td><td><b style="color:orange">${d.durum}</b></td>
        <td><button onclick="deleteDemand(${d.id})" style="border:none; cursor:pointer; background:none;">🗑️</button></td></tr>
    `).join('');
}

async function deleteDemand(id) {
    if(!confirm("Silinsin mi?")) return;
    await _supabase.from('demands').delete().eq('id', id);
    location.reload();
}

// TABLO VE FİLTRE
function renderTable() {
    const s = document.getElementById('qSearch').value.toLowerCase();
    const b = document.getElementById('qBirim').value;
    const st = document.getElementById('qStatus').value;
    
    document.getElementById('tableBody').innerHTML = db.pos.filter(p => {
        const fiili = p.names ? p.names.length : 0;
        const statusMatch = (!st) || (st==='vacant' && p.norm > fiili) || (st==='full' && p.norm <= fiili);
        return (p.poz.toLowerCase().includes(s) || p.birim.toLowerCase().includes(s)) && (!b || p.birim === b) && statusMatch;
    }).map(p => {
        const fiili = p.names ? p.names.length : 0;
        return `<tr><td><b>${p.birim}</b></td><td>${p.poz}</td><td>${p.norm}</td><td>${fiili}</td>
                <td style="color:${p.norm>fiili ? 'var(--red)':'var(--green)'}; font-weight:700;">${p.norm>fiili ? (p.norm-fiili)+' Boş':'Tam'}</td></tr>`;
    }).join('');
}

function renderCharts() {
    const norm = db.pos.reduce((a,b)=>a+(b.norm||0),0);
    const fiili = db.pos.reduce((a,b)=>a+(b.names?b.names.length:0),0);
    document.getElementById('statsGrid').innerHTML = `
        <div class="stat-card"><h4>Toplam Norm</h4><h2>${norm}</h2></div>
        <div class="stat-card"><h4>Fiili</h4><h2>${fiili}</h2></div>
        <div class="stat-card"><h4>Boş</h4><h2 style="color:var(--red)">${norm-fiili}</h2></div>
        <div class="stat-card"><h4>Doluluk</h4><h2>%${Math.round((fiili/norm)*100)}</h2></div>
    `;

    document.getElementById('vacantBody').innerHTML = db.pos.filter(p => p.norm > (p.names?p.names.length:0)).map(p => {
        const f = p.names ? p.names.length : 0;
        return `<tr><td><b>${p.birim}</b></td><td>${p.poz}</td><td>${p.norm}</td><td>${f}</td><td style="color:var(--red); font-weight:bold">${p.norm-f}</td></tr>`;
    }).join('');

    // GRAFİK ÇİZİMİ (KÜÇÜLTÜLMÜŞ)
    const m = db.pos.filter(p => p.yaka && p.yaka.includes('Mavi')).length;
    const b = db.pos.filter(p => p.yaka && p.yaka.includes('Beyaz')).length;
    if(charts.c1) charts.c1.destroy();
    charts.c1 = new Chart(document.getElementById('chartCollar'), {
        type: 'doughnut',
        data: { labels: ['Mavi','Beyaz'], datasets:[{data:[m,b], backgroundColor:['#10b981','#4f46e5']}] },
        options: { maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
    });
}

async function processAndSync() {
    const file = document.getElementById('csvFile').files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = async (e) => {
        const rows = e.target.result.split(/\r?\n/).filter(r => r.trim() !== "").slice(1);
        const temp = {};
        rows.forEach(row => {
            const c = row.split(';');
            if(c.length >= 4) {
                const b = c[1].trim(); const p = c[2].trim(); const y = c[3].trim(); const n = (c[4] || "").trim();
                const k = `${b}-${p}-${y}`;
                if(!temp[k]) temp[k] = { birim: b, poz: p, yaka: y, norm: 0, names: [] };
                temp[k].norm += 1; if(n.length > 1) temp[k].names.push(n);
            }
        });
        await _supabase.from('norm_kadro').upsert(Object.values(temp), { onConflict: 'birim,poz,yaka' });
        location.reload();
    };
    reader.readAsText(file, 'ISO-8859-9');
}

function updateFilters() {
    const u = [...new Set(db.pos.map(p => p.birim))];
    document.getElementById('qBirim').innerHTML = '<option value="">Tüm Birimler</option>' + u.map(x=>`<option value="${x}">${x}</option>`).join('');
}

function toggleUpload(s) { document.getElementById('upload-overlay').classList.toggle('hidden', !s); }
function showView(v, btn) {
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    ['view-table', 'view-dash', 'view-demands'].forEach(id => document.getElementById(id).classList.add('hidden'));
    document.getElementById('view-' + v).classList.remove('hidden');
    if(v === 'dash') renderCharts();
}

loadData();
</script>
</body>
</html>
