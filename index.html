<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EB Norm Portal v3.1 - Bilal Versiyonu</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* ... (Mevcut v3.0 CSS'in aynısı kalsın) ... */
    </style>
</head>
<body>

<div class="sidebar">
    <h2 style="text-align:center; margin-bottom:30px; font-weight:800;">EB NORM PORTAL</h2>
    <button class="nav-btn active" onclick="showView('table', this)">📋 Kadro Listesi</button>
    <button class="nav-btn" onclick="showView('dash', this)">📊 Analiz Paneli</button>
    <button class="nav-btn" onclick="showView('demands', this)">💡 Talep Yönetimi</button>
    
    <div style="margin-top:auto">
        <button class="nav-btn" onclick="toggleUpload(true)" style="color:var(--green)">➕ Dosya Yükle</button>
        <button class="nav-btn" onclick="location.reload()" style="color:#60a5fa">🔄 Veriyi Tazele</button>
    </div>
</div>

<div class="main">
    <div id="view-table">
        <div class="filter-bar">
            <input type="text" id="qSearch" class="f-input" placeholder="Pozisyon veya Birim ara..." oninput="renderTable()">
            <select id="qBirim" class="f-input" onchange="renderTable()"><option value="">Tüm Birimler</option></select>
            <select id="qYaka" class="f-input" onchange="renderTable()">
                <option value="">Tüm Yakalar</option>
                <option value="Mavi yaka">Mavi Yaka</option>
                <option value="Beyaz yaka">Beyaz Yaka</option>
            </select>
            <select id="qStatus" class="f-input" onchange="renderTable()">
                <option value="">Doluluk Tümü</option>
                <option value="full">Tümü Dolu ✅</option>
                <option value="vacant">Sadece Boş 🔴</option>
            </select>
        </div>
        <div class="card" style="padding:0; overflow:hidden;">
            <table>
                <thead><tr><th>Birim</th><th>Pozisyon</th><th>Yaka</th><th>Norm</th><th>Fiili</th><th>Durum</th></tr></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <div id="view-dash" class="hidden">
        <div class="stats-grid" id="statsGrid"></div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
            <div class="card"><h3>Yaka Dağılımı</h3><canvas id="chartCollar"></canvas></div>
            <div class="card"><h3>Birim Doluluk Performance</h3><canvas id="chartUnits"></canvas></div>
        </div>
        <div class="card" style="padding:0; overflow:hidden; margin-top:20px">
            <h3 style="padding:15px; margin:0; border-bottom: 2px solid #eee">Sadece Boş Kadrolar (1 Bakışta)</h3>
            <table id="vacantTable">
                <thead><tr><th>Birim</th><th>Pozisyon</th><th>Norm</th><th>Fiili</th><th>Eksik</th></tr></thead>
                <tbody id="vacantBody"></tbody>
            </table>
        </div>
    </div>

    </div>

<script>
// --- SUPABASE BAĞLANTISI ---
const supabaseUrl = 'https://kvnkjzympplbpvvmuqdw.supabase.co';
const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt2bmtqenltcHBsYnB2dm11cWR3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxMDQ3NDcsImV4cCI6MjA4ODY4MDc0N30.Ajf2gASU_PxhTKZvH0UDg-XXmbCj3bJYww-otWEI73w'; // <--- BURAYA KENDİ ANON KEY'İNİ YAPIŞTIR!
const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

let db = { pos: [], demands: [] };
let charts = {};

async function loadData() {
    const { data: pos } = await _supabase.from('norm_kadro').select('*');
    const { data: dem } = await _supabase.from('demands').select('*').order('created_at', {ascending: false});
    if(pos) db.pos = pos;
    if(dem) db.demands = dem;
    updateFilters();
    renderTable();
    renderDemands();
    // Veri yüklendiğinde analiz paneli grafiklerini de tazele
    if(charts.c1) renderCharts();
}

// ... (CSV, Talep ve diğer fonksiyonlar aynı kalsın, sadece renderTable güncellendi) ...

function renderTable() {
    const s = document.getElementById('qSearch').value.toLowerCase();
    const b = document.getElementById('qBirim').value;
    const y = document.getElementById('qYaka').value;
    const st = document.getElementById('qStatus').value; // <--- YENİ FİLTRE DEĞİŞKENİ
    
    document.getElementById('tableBody').innerHTML = db.pos.filter(p => {
        const fiili = p.names ? p.names.length : 0;
        const bCount = p.norm - fiili;

        const matchesStatus = 
            (!st) || 
            (st === 'full' && bCount === 0) || 
            (st === 'vacant' && bCount > 0);

        return (p.poz.toLowerCase().includes(s) || p.birim.toLowerCase().includes(s)) &&
               (!b || p.birim === b) && 
               (!y || p.yaka === y) &&
               matchesStatus; // <--- YENİ FİLTRE MANTIĞI
    }).map(p => {
        const fiili = p.names ? p.names.length : 0;
        const bCount = p.norm - fiili;
        return `<tr><td><b>${p.birim}</b></td><td>${p.poz}</td><td>${p.yaka}</td><td>${p.norm}</td><td>${fiili}</td>
                <td style="color:${bCount>0? 'var(--red)':'var(--green)'}">${bCount > 0 ? bCount + ' Boş' : 'Tam ✅'}</td></tr>`;
    }).join('');
}

// ... (CSV, Talep, updateFilters vb. fonksiyonlar aynı kalsın) ...

// --- ANALİZ PANELİ VE 1. VE 2. İSTEK DEĞİŞİMLERİ ---
function renderCharts() {
    const norm = db.pos.reduce((a,b)=>a+(b.norm||0),0);
    const fiili = db.pos.reduce((a,b)=>a+(b.names?b.names.length:0),0);
    document.getElementById('statsGrid').innerHTML = `
        <div class="stat-card"><h4>Toplam Norm</h4><h2>${norm}</h2></div>
        <div class="stat-card"><h4>Fiili</h4><h2>${fiili}</h2></div>
        <div class="stat-card"><h4>Eksik</h4><h2 style="color:var(--red)">${norm-fiili}</h2></div>
        <div class="stat-card"><h4>Doluluk</h4><h2>%${Math.round((fiili/norm)*100)}</h2></div>
    `;

    // 1. BOŞ KADROLARI LİSTELEME
    document.getElementById('vacantBody').innerHTML = db.pos.filter(p => {
        const fiili = p.names ? p.names.length : 0;
        return (p.norm - fiili) > 0; // Sadece boş olanlar
    }).map(p => {
        const fiili = p.names ? p.names.length : 0;
        const bCount = p.norm - fiili;
        return `<tr><td><b>${p.birim}</b></td><td>${p.poz}</td><td>${p.norm}</td><td>${fiili}</td>
                <td style="color:var(--red); font-weight:bold">${bCount} Kişi</td></tr>`;
    }).join('');

    // ... (Yaka ve Birim Grafikleri aynı v3.0 gibi kalsın) ...
}

// ... (showView vb. fonksiyonlar aynı kalsın) ...

loadData();
</script>
</body>
</html>
