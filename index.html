<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EB Norm Portal - Canlı Sistem</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* CSS AYARLARI (Senin şık tasarımın) */
        :root { --bg: #f1f5f9; --sidebar: #0f172a; --accent: #4f46e5; --card: #ffffff; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); display: flex; height: 100vh; margin: 0; }
        .sidebar { width: 260px; background: var(--sidebar); color: white; padding: 20px; display: flex; flex-direction: column; }
        .main { flex: 1; overflow-y: auto; padding: 25px; }
        .nav-btn { padding: 12px; cursor: pointer; border-radius: 10px; color: #94a3b8; border: none; background: none; width: 100%; text-align: left; font-weight: 600; margin-bottom: 5px; }
        .nav-btn.active { background: var(--accent); color: white; }
        .card { background: white; border-radius: 16px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 20px; border-radius: 15px; text-align: center; border-bottom: 4px solid var(--accent); }
        .hidden { display: none !important; }
        input, select, textarea { width: 100%; padding: 10px; margin-top: 10px; border-radius: 8px; border: 1px solid #ddd; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; font-size: 13px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 style="text-align:center; margin-bottom:30px;">EB NORM PORTAL</h2>
    <button class="nav-btn active" onclick="showView('table', this)">📋 Kadro Listesi</button>
    <button class="nav-btn" onclick="showView('dash', this)">📊 Analiz Paneli</button>
    <button class="nav-btn" onclick="showView('demands', this)">💡 Talep Yönetimi</button>
    <div style="margin-top:auto">
        <button class="nav-btn" onclick="syncToCloud()" style="color:#10b981">☁️ Buluta Yedekle</button>
        <button class="nav-btn" onclick="location.reload()" style="color:#60a5fa">🔄 Sayfayı Yenile</button>
    </div>
</div>

<div class="main">
    <div id="view-table">
        <div class="card">
            <input type="text" id="search" placeholder="Birim veya Pozisyon ara..." oninput="renderData()">
            <table>
                <thead><tr><th>Birim</th><th>Pozisyon</th><th>Norm</th><th>Fiili</th><th>Doluluk</th></tr></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <div id="view-dash" class="hidden">
        <div class="stats-grid" id="statsGrid"></div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
            <div class="card"><h3>Yaka Dağılımı</h3><canvas id="chartCollar"></canvas></div>
            <div class="card"><h3>Birim Bazlı Norm</h3><canvas id="chartUnits"></canvas></div>
        </div>
    </div>

    <div id="view-demands" class="hidden">
        <div style="display:grid; grid-template-columns: 1fr 2fr; gap:20px;">
            <div class="card">
                <h3>Yeni Talep Oluştur</h3>
                <input type="text" id="t-birim" placeholder="Hangi Birim?">
                <input type="text" id="t-poz" placeholder="Hangi Pozisyon?">
                <select id="t-yaka"><option value="Mavi yaka">Mavi Yaka</option><option value="Beyaz yaka">Beyaz Yaka</option></select>
                <textarea id="t-neden" placeholder="Talep Gerekçesi" rows="4"></textarea>
                <button onclick="addDemand()" style="width:100%; margin-top:15px; background:#10b981; color:white; padding:12px; border:none; border-radius:8px; cursor:pointer; font-weight:bold;">Talebi Gönder</button>
            </div>
            <div class="card">
                <h3>Aktif Talepler (Buluttan Canlı)</h3>
                <table id="demandTable">
                    <thead><tr><th>Birim</th><th>Pozisyon</th><th>Neden</th><th>Durum</th></tr></thead>
                    <tbody id="demandBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
const supabaseUrl = 'https://kvnkjzympplbpvvmuqdw.supabase.co';
const supabaseKey = 'EYJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'; // <--- BURAYA KENDİ ANON KEY'İNİ YAPIŞTIR!
const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

let db = { pos: [], demands: [] };
let charts = {};

async function loadInitialData() {
    const { data: pos } = await _supabase.from('norm_kadro').select('*');
    const { data: dem } = await _supabase.from('demands').select('*').order('created_at', { ascending: false });
    if(pos) db.pos = pos;
    if(dem) db.demands = dem;
    renderData();
    renderDemands();
}

// --- TALEP EKLEME FONKSİYONU ---
async function addDemand() {
    const birim = document.getElementById('t-birim').value;
    const poz = document.getElementById('t-poz').value;
    const yaka = document.getElementById('t-yaka').value;
    const neden = document.getElementById('t-neden').value;

    if(!birim || !poz) return alert("Lütfen birim ve pozisyon girin!");

    const { data, error } = await _supabase.from('demands').insert([
        { birim, pozisyon: poz, yaka, neden, durum: 'Beklemede' }
    ]);

    if(error) alert("Hata: " + error.message);
    else {
        alert("Talep başarıyla iletildi!");
        location.reload(); // Sayfayı yenileyip listeyi tazele
    }
}

function renderDemands() {
    document.getElementById('demandBody').innerHTML = db.demands.map(d => `
        <tr><td>${d.birim}</td><td>${d.pozisyon}</td><td>${d.neden || '-'}</td><td><b>${d.durum}</b></td></tr>
    `).join('');
}

// --- ANALİZ PANELİ (GRAFİK MOTORU) ---
function renderCharts() {
    // 1. Özet İstatistikler
    const totalNorm = db.pos.reduce((a, b) => a + (b.norm || 0), 0);
    const totalActual = db.pos.reduce((a, b) => a + (b.names ? b.names.length : 0), 0);
    
    document.getElementById('statsGrid').innerHTML = `
        <div class="stat-card"><h4>Toplam Norm</h4><h2>${totalNorm}</h2></div>
        <div class="stat-card" style="border-color:#10b981"><h4>Fiili Çalışan</h4><h2>${totalActual}</h2></div>
        <div class="stat-card" style="border-color:#f59e0b"><h4>Eksik Kadro</h4><h2>${totalNorm - totalActual}</h2></div>
        <div class="stat-card" style="border-color:#ef4444"><h4>Doluluk</h4><h2>%${Math.round((totalActual/totalNorm)*100)}</h2></div>
    `;

    // 2. Yaka Grafiği
    const m = db.pos.filter(p => p.yaka && p.yaka.includes('Mavi')).length;
    const b = db.pos.filter(p => p.yaka && p.yaka.includes('Beyaz')).length;
    
    if(charts.c1) charts.c1.destroy();
    charts.c1 = new Chart(document.getElementById('chartCollar'), {
        type: 'doughnut',
        data: { labels: ['Mavi','Beyaz'], datasets: [{ data: [m,b], backgroundColor: ['#10b981','#4f46e5'] }] }
    });
}

function showView(v, btn) {
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    ['view-table', 'view-dash', 'view-demands'].forEach(id => document.getElementById(id).classList.add('hidden'));
    document.getElementById('view-' + v).classList.remove('hidden');
    if(v === 'dash') renderCharts();
}

function renderData() {
    const search = document.getElementById('search').value.toLowerCase();
    document.getElementById('tableBody').innerHTML = db.pos
        .filter(p => p.birim.toLowerCase().includes(search) || p.poz.toLowerCase().includes(search))
        .map(p => {
            const f = p.names ? p.names.length : 0;
            return `<tr><td><b>${p.birim}</b></td><td>${p.poz}</td><td>${p.norm}</td><td>${f}</td><td>%${Math.round((f/p.norm)*100)}</td></tr>`;
        }).join('');
}

loadInitialData();
</script>
</body>
</html>
